<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Registration - Shiksha Nex Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F9FAFB;
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --secondary: #64748B;
            --card-bg: #FFFFFF;
            --border: #E5E7EB;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --success: #22C55E;
            --warning: #F59E0B;
            --error: #EF4444;
            --shadow: 0px 10px 25px rgba(0,0,0,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            height: 70px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .header-content {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo span {
            color: var(--primary);
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* Main Content */
        .main-content {
            padding: 120px 0 60px;
            min-height: 100vh;
        }

        .form-container {
            max-width: 720px;
            margin: 0 auto;
        }

        .form-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .form-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Form Grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        input, select {
            height: 44px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        /* File Upload */
        .file-upload {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .file-upload:hover {
            border-color: var(--primary);
            background: #F9FAFB;
        }

        .file-upload svg {
            width: 32px;
            height: 32px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .file-upload p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .file-upload span {
            color: var(--primary);
            font-weight: 500;
        }

        /* Agreement Box */
        .agreement-box {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 8px;
            margin-top: 32px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
        }

        .checkbox-item input {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: var(--primary);
        }

        .checkbox-item label {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
            cursor: pointer;
        }

        /* Buttons */
        .btn {
            height: 48px;
            padding: 0 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            margin-top: 24px;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Steps Indicator */
        .steps {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .step.active .step-circle {
            background: var(--primary);
            color: white;
        }

        .step.completed .step-circle {
            background: var(--success);
            color: white;
        }

        .step-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .step.active .step-label,
        .step.completed .step-label {
            color: var(--text-primary);
            font-weight: 500;
        }

        .step-line {
            width: 40px;
            height: 2px;
            background: var(--border);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-card {
                padding: 24px;
            }

            .steps {
                flex-wrap: wrap;
            }

            .step-label {
                display: none;
            }

            .step-line {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .main-content {
                padding: 100px 0 40px;
            }

            .form-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container header-content">
            <a href="index.html" class="logo">Shiksha Nex <span>Technologies</span></a>
            <a href="index.html" class="back-link">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Home
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Steps Indicator -->
            <div class="steps">
                <div class="step active">
                    <div class="step-circle">1</div>
                    <span class="step-label">Register</span>
                </div>
                <div class="step-line"></div>
                <div class="step">
                    <div class="step-circle">2</div>
                    <span class="step-label">Agreement</span>
                </div>
                <div class="step-line"></div>
                <div class="step">
                    <div class="step-circle">3</div>
                    <span class="step-label">Review</span>
                </div>
                <div class="step-line"></div>
                <div class="step">
                    <div class="step-circle">4</div>
                    <span class="step-label">Done</span>
                </div>
            </div>

            <div class="form-container">
                <div class="form-card">
                    <h1 class="form-title">Internship Registration Form</h1>
                    <p class="form-subtitle">Fill in your details to register for the internship program</p>

                    <form id="registrationForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="fullName">Full Name *</label>
                                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                            </div>

                            <div class="form-group">
                                <label for="email">Email Address *</label>
                                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                            </div>

                            <div class="form-group">
                                <label for="phone">Phone Number *</label>
                                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                            </div>

                            <div class="form-group">
                                <label for="college">College Name *</label>
                                <input type="text" id="college" name="college" placeholder="Enter your college name" required>
                            </div>

                            <div class="form-group">
                                <label for="branch">Course / Branch *</label>
                                <select id="branch" name="branch" required>
                                    <option value="">Select your course</option>
                                    <option value="computer-science">Computer Science</option>
                                    <option value="information-science">Information Science</option>
                                    <option value="electronics">Electronics</option>
                                    <option value="mechanical">Mechanical</option>
                                    <option value="civil">Civil</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="year">Year of Study *</label>
                                <select id="year" name="year" required>
                                    <option value="">Select year</option>
                                    <option value="1st-year">1st Year</option>
                                    <option value="2nd-year">2nd Year</option>
                                    <option value="3rd-year">3rd Year</option>
                                    <option value="4th-year">4th Year</option>
                                    <option value="graduate">Graduate</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="city">City *</label>
                                <input type="text" id="city" name="city" placeholder="Enter your city" required>
                            </div>

                            <div class="form-group">
                                <label for="state">State *</label>
                                <input type="text" id="state" name="state" placeholder="Enter your state" required>
                            </div>

                            <div class="form-group full-width">
                                <label>Upload Resume *</label>
                                <div class="file-upload" onclick="document.getElementById('resume').click()">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                    <p>Drag and drop your resume here or <span>browse</span></p>
                                    <p style="font-size: 12px; margin-top: 4px;">PDF, DOC, DOCX up to 5MB</p>
                                    <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" style="display: none;" required>
                                </div>
                            </div>
                        </div>

                        <!-- Agreement Box -->
                        <div class="agreement-box">
                            <div class="checkbox-group">
                                <div class="checkbox-item">
                                    <input type="checkbox" id="agreeFees" name="agreeFees">
                                    <label for="agreeFees">I agree to the Fees & Service Policy</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="agreeTerms" name="agreeTerms">
                                    <label for="agreeTerms">I agree to the Terms & Conditions</label>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary" id="continueBtn" disabled>
                            Continue to Agreement
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Handle checkboxes
        const agreeFees = document.getElementById('agreeFees');
        const agreeTerms = document.getElementById('agreeTerms');
        const continueBtn = document.getElementById('continueBtn');

        function updateButtonState() {
            continueBtn.disabled = !(agreeFees.checked && agreeTerms.checked);
        }

        agreeFees.addEventListener('change', updateButtonState);
        agreeTerms.addEventListener('change', updateButtonState);

        // Handle file upload display
        const resumeInput = document.getElementById('resume');
        resumeInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const fileUpload = document.querySelector('.file-upload');
                fileUpload.innerHTML = `
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:32px;height:32px;color:#22C55E;margin-bottom:8px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <p style="color:#22C55E;font-weight:500;">${this.files[0].name}</p>
                    <p style="font-size:12px;margin-top:4px;">Click to change file</p>
                `;
            }
        });

        // Handle form submission
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Store form data
            const formData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                college: document.getElementById('college').value,
                branch: document.getElementById('branch').value,
                year: document.getElementById('year').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                resume: resumeInput.files[0] ? resumeInput.files[0].name : ''
            };
            
            localStorage.setItem('registrationData', JSON.stringify(formData));
            window.location.href = 'agreement.html';
        });
    </script>
</body>
</html>
